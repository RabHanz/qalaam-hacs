packages:
  - 'packages/*'
  - 'apps/*'
  - 'integrations/*'
  - 'services/*'
  - 'tooling/*'
  - '!**/dist/**'
  - '!**/build/**'
  - '!**/node_modules/**'

# pnpm 9+ catalog: pin shared dep versions in one place
catalog:
  typescript: ^5.6.3
  '@types/node': ^22.9.0
  vitest: ^2.1.5
  zod: ^3.23.8
  pino: ^9.5.0
