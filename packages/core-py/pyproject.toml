[project]
name = "qalaam-core"
version = "0.0.1"
description = "Qalaam — domain primitives (Python). Mirror of @qalaam/core for Python services and the HA integration."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0" }
authors = [{ name = "Qalaam Maintainers" }]

dependencies = [
    "qalaam-types",
]

[tool.uv.sources]
qalaam-types = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qalaam_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
