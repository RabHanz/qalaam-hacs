[project]
name = "qalaam-types"
version = "0.0.1"
description = "Qalaam — generated Pydantic v2 models from @qalaam/schema. AUTOGENERATED. DO NOT EDIT."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { text = "Apache-2.0" }
authors = [{ name = "Qalaam Maintainers" }]

dependencies = [
    "pydantic>=2.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["qalaam_types"]
