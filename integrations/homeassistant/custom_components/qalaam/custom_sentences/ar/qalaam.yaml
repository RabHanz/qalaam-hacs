# Qalaam Voice sentences — Arabic.
# Pair with custom_sentences/en/qalaam.yaml for the dual-pipeline household setup
# (HA Voice Chapter 11, Oct 2025).
language: ar
intents:
  QalaamPlaySurah:
    data:
      - sentences:
          - "شغل سورة {surah}"
          - "ابدأ سورة {surah}"
        slots:
          surah: "{surah}"

  QalaamPlayAyah:
    data:
      - sentences:
          - "شغل آية {surah} {ayah}"
        slots:
          surah: "{surah}"
          ayah: "{ayah}"

  QalaamStartHifdh:
    data:
      - sentences:
          - "ابدأ جلسة الحفظ"
          - "اختبرني"

lists:
  surah:
    wildcard: true
  ayah:
    range:
      from: 1
      to: 286
