# Qalaam Family-private khatm announcement
#
# Per INTRO.md: "Family-private khatm announcements ('Dad finished
# his juz — 4 to go for tonight's khatm')."
#
# Subscribes to the `qalaam_family_khatm_milestone` event the
# integration fires when any family member completes a juz toward
# a shared khatm. Announces the milestone via TTS on the family-
# room speaker, gently.
#
# Adab posture (per INTRO + CLAUDE.md): family-private — never
# leaves the household. Wording is calm encouragement, never a
# competitive nudge. The speaker plays at a polite volume so it
# doesn't startle the family. Skipped during prayer windows.

blueprint:
  name: Qalaam · Family khatm announcement
  description: >
    When any family member completes a juz of a shared khatm, the
    family-room speaker softly announces "<name> finished their juz —
    N to go." Family-private. Skipped during prayer windows.
  domain: automation
  source_url: https://github.com/RabHanz/qalaam-hacs/blob/main/blueprints/automation/qalaam/family-khatm-announce.yaml
  homeassistant:
    min_version: 2024.10.0
  input:
    family_room_speaker:
      name: Family-room speaker
      selector:
        entity:
          domain: media_player
    tts_engine:
      name: TTS engine
      default: tts.google_cloud_say
      selector:
        text: {}
    speaker_volume:
      name: Announcement volume
      default: 0.45
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider
    skip_in_prayer:
      name: Skip in prayer window
      default: true
      selector:
        boolean: {}
    in_prayer_sensor:
      name: In-prayer-window binary sensor (optional)
      default: ""
      selector:
        entity:
          domain: binary_sensor
          integration: qalaam

trigger:
  - platform: event
    event_type: qalaam_family_khatm_milestone

condition:
  - condition: template
    value_template: >-
      {% set s = '!input in_prayer_sensor' %}
      {% if s != '' and !input skip_in_prayer %}
      {{ not is_state(s, 'on') }}
      {% else %}true{% endif %}

action:
  - variables:
      name: "{{ trigger.event.data.member_name | default('A family member') }}"
      remaining: "{{ trigger.event.data.juz_remaining | int(0) }}"
      message: >-
        {{ name }} finished their juz.
        {% if remaining > 0 %}{{ remaining }} to go for tonight's khatm.
        {% else %}The family khatm is complete — alhamdulillah.
        {% endif %}
  - service: media_player.volume_set
    target:
      entity_id: !input family_room_speaker
    data:
      volume_level: !input speaker_volume
  - service: !input tts_engine
    target:
      entity_id: !input family_room_speaker
    data:
      message: "{{ message }}"

mode: queued
max: 6
