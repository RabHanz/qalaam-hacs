# Qalaam Per-room sabaq announcement
#
# Per INTRO.md: "Per-room sabaq announcements. The kid's room speaker
# softly says 'your sabaq starts now' at the agreed-upon time, in the
# right voice."
#
# At a scheduled time, the configured kid's-room speaker softly
# announces "your sabaq starts now" (TTS in user's language), then
# starts playing the current sabqi from Qalaam at low volume.
# Optionally dims the room lights to a focus scene + extinguishes
# any media on the TV.
#
# Adab posture: gentle voice, low volume. Never on a Friday during
# Surah Kahf hours (the household has other things going on).
# Never inside an active prayer window.

blueprint:
  name: Qalaam · Per-room sabaq announcement
  description: >
    At a scheduled time, the kid's-room speaker softly announces
    "your sabaq starts now" and begins playing the current sabqi
    portion via Qalaam. Optionally dims lights + pauses TV. Skips
    inside prayer windows. Never on Surah-Kahf-Friday-window if
    flagged.
  domain: automation
  source_url: https://github.com/RabHanz/qalaam-hacs/blob/main/blueprints/automation/qalaam/per-room-sabaq-announce.yaml
  homeassistant:
    min_version: 2024.10.0
  input:
    schedule_time:
      name: Daily session time (24h)
      description: When to fire the announcement.
      default: "16:00:00"
      selector:
        time: {}
    room_speaker:
      name: Room speaker
      description: The speaker that announces and plays.
      selector:
        entity:
          domain: media_player
    tts_engine:
      name: TTS engine
      description: e.g. `tts.cloud_say`, `tts.piper`, `tts.openai_tts`.
      default: tts.google_cloud_say
      selector:
        text: {}
    announcement_text:
      name: Announcement text
      description: Spoken before playback starts.
      default: "Your sabaq starts now. Bismillah."
      selector:
        text:
          multiline: true
    speaker_volume:
      name: Playback volume
      description: Soft enough not to be sharp; usually 0.20–0.40.
      default: 0.30
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider
    room_lights:
      name: Room lights to dim (optional)
      default: []
      selector:
        entity:
          domain: light
          multiple: true
    focus_brightness_pct:
      name: Focus-scene brightness (%)
      description: Lights dim to this brightness during the session.
      default: 70
      selector:
        number:
          min: 0
          max: 100
          mode: slider
          unit_of_measurement: "%"
    skip_in_prayer:
      name: Skip in prayer window
      default: true
      selector:
        boolean: {}
    in_prayer_sensor:
      name: In-prayer-window binary sensor
      default: ""
      selector:
        entity:
          domain: binary_sensor
          integration: qalaam

trigger:
  - platform: time
    at: !input schedule_time

condition:
  - condition: template
    value_template: >-
      {% set s = '!input in_prayer_sensor' %}
      {% if s != '' and !input skip_in_prayer %}
      {{ not is_state(s, 'on') }}
      {% else %}true{% endif %}

action:
  - parallel:
      # Soft focus scene on the room lights.
      - if:
          - "{{ ('!input room_lights') | length > 0 }}"
        then:
          - service: light.turn_on
            target:
              entity_id: !input room_lights
            data:
              brightness_pct: !input focus_brightness_pct
              transition: 4
      # TTS announcement, then play sabqi.
      - sequence:
          - service: media_player.volume_set
            target:
              entity_id: !input room_speaker
            data:
              volume_level: !input speaker_volume
          - service: !input tts_engine
            target:
              entity_id: !input room_speaker
            data:
              message: !input announcement_text
          # Wait for TTS to finish before sabqi starts.
          - delay:
              seconds: 4
          - service: qalaam.play_current_sabqi
            data:
              target: !input room_speaker

mode: single
