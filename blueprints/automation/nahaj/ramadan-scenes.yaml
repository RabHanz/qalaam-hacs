# Nahaj Ramadan scenes — sahoor + iftar lighting + audio
#
# Per INTRO.md: "Ramadan-aware UI mode (juz-a-day default goal,
# sahoor and iftar countdowns, Taraweeh tracker, Laylat al-Qadr
# odd-night reminders, soft warm-light scenes for sahoor and bright
# scenes for iftar)."
#
# Listens for Nahaj's `sensor.nahaj_ramadan_phase` transitions
# (suhoor / day / iftar / taraweeh / odd_night) and applies the
# appropriate lighting + audio scene to the configured rooms.
#
# Phase semantics:
#   • suhoor      — pre-Fajr meal window. Soft warm dim (1800K).
#   • day         — fasting hours. Lights track natural light;
#                   audio defaults to soft Quran loop.
#   • iftar       — Maghrib + 30 min. Bright welcoming kelvin (3000K).
#                   Single brief Quran cue at iftar moment.
#   • taraweeh    — Isha → 90 min later. Mosque-ambient lighting in
#                   the prayer room.
#   • odd_night   — Last 10 nights of Ramadan, odd-numbered. Subtle
#                   gold accent ribbon — Laylat al-Qadr awareness.
#
# Adab posture: never celebratory popups. Lighting changes are
# contemplative; audio cues are brief; Laylat al-Qadr is honoured
# without spectacle.

blueprint:
  name: Nahaj · Ramadan scenes
  description: >
    Lighting + audio scenes that follow the Ramadan day shape —
    suhoor (warm dim), day (natural), iftar (welcoming bright),
    taraweeh (prayer-room ambient), odd nights of the last ten
    (gold accent for Laylat al-Qadr awareness).
  domain: automation
  source_url: https://github.com/RabHanz/nahaj-hacs/blob/main/blueprints/automation/nahaj/ramadan-scenes.yaml
  homeassistant:
    min_version: 2024.10.0
  input:
    ramadan_phase_sensor:
      name: Ramadan-phase sensor
      description: >
        Nahaj's `sensor.nahaj_ramadan_phase`. Cycles through
        suhoor → day → iftar → taraweeh → odd_night → none.
      selector:
        entity:
          domain: sensor
          integration: nahaj
    suhoor_lights:
      name: Suhoor / kitchen lights
      default: []
      selector:
        entity:
          domain: light
          multiple: true
    iftar_lights:
      name: Iftar / dining lights
      default: []
      selector:
        entity:
          domain: light
          multiple: true
    prayer_room_lights:
      name: Prayer-room lights (Taraweeh)
      default: []
      selector:
        entity:
          domain: light
          multiple: true
    ambient_speaker:
      name: Ambient speaker
      description: Plays a brief Quran cue at iftar.
      default: ""
      selector:
        entity:
          domain: media_player
    iftar_surah_number:
      name: Iftar moment — surah to play briefly
      description: 0 to disable the iftar audio cue. Default 78 (an-Naba'), short and welcoming.
      default: 78
      selector:
        number:
          min: 0
          max: 114
          mode: box

trigger:
  - platform: state
    entity_id: !input ramadan_phase_sensor

action:
  - choose:
      - conditions:
          - condition: state
            entity_id: !input ramadan_phase_sensor
            state: "suhoor"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input suhoor_lights
            data:
              brightness_pct: 35
              kelvin: 1800
              transition: 12
      - conditions:
          - condition: state
            entity_id: !input ramadan_phase_sensor
            state: "iftar"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input iftar_lights
            data:
              brightness_pct: 90
              kelvin: 3000
              transition: 4
          - if:
              - "{{ '!input ambient_speaker' != '' }}"
              - "{{ iftar_surah_number_input() | int(0) > 0 }}"
            then:
              - service: nahaj.play_surah
                data:
                  surah: !input iftar_surah_number
                  target: !input ambient_speaker
      - conditions:
          - condition: state
            entity_id: !input ramadan_phase_sensor
            state: "taraweeh"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input prayer_room_lights
            data:
              brightness_pct: 50
              kelvin: 2700
              transition: 6
      - conditions:
          - condition: state
            entity_id: !input ramadan_phase_sensor
            state: "odd_night"
        sequence:
          # Subtle gold accent on the prayer-room lights to mark
          # awareness of Laylat al-Qadr possibility. No celebratory
          # spectacle — just a quiet acknowledgement.
          - service: light.turn_on
            target:
              entity_id: !input prayer_room_lights
            data:
              brightness_pct: 38
              rgb_color: [212, 175, 55]
              transition: 18

mode: restart
