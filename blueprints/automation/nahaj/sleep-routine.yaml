# Nahaj Sleep routine — last-reviewed portion at lights-out
#
# Per INTRO.md: "Sleep + wake routines — last night's reviewed portion
# plays at lights-out... Before sleep the bedroom speaker fades in
# your last reviewed portion at low volume. The bedside light dims
# to amber. The house gets quiet."
#
# When the user (or a scheduled trigger) marks "going to bed":
#   • Bedroom speaker plays the user's last-reviewed Hifdh portion at
#     low volume (`nahaj.play_surah` with current sabqi range)
#   • Bedside light fades to a warm amber over 60s
#   • Other room lights gradually extinguish
#   • Sleep timer set so playback fades out after N minutes
#
# Adab posture: ambient repetition is one of the oldest, most evidence-
# backed memorization techniques. Volume stays low enough not to
# disturb a partner. The fadeout is gradual so the room transitions
# into silence rather than cutting abruptly.

blueprint:
  name: Nahaj · Sleep routine — last-reviewed portion
  description: >
    Fade in the user's last-reviewed Hifdh portion at low volume,
    dim the bedside light to warm amber, and run a gentle fadeout
    after a configurable sleep timer. The portion that plays is the
    `current_sabqi` from Nahaj's coordinator, in the user's
    chosen reciter.
  domain: automation
  source_url: https://github.com/RabHanz/nahaj-hacs/blob/main/blueprints/automation/nahaj/sleep-routine.yaml
  homeassistant:
    min_version: 2024.10.0
  input:
    trigger_input_boolean:
      name: Trigger input_boolean
      description: >
        Toggle ON to start the routine. Wire your "Goodnight" button
        / voice intent / scheduled time to flip this.
      selector:
        entity:
          domain: input_boolean
    bedroom_speaker:
      name: Bedroom speaker
      description: Where the recitation plays.
      selector:
        entity:
          domain: media_player
    sabqi_sensor:
      name: Current-sabqi sensor
      description: >
        Nahaj's `sensor.nahaj_current_sabqi` — the portion the
        family is currently memorizing/reviewing.
      selector:
        entity:
          domain: sensor
          integration: nahaj
    bedside_light:
      name: Bedside light (optional)
      description: Fades to warm amber when the routine starts.
      default: ""
      selector:
        entity:
          domain: light
    other_lights:
      name: Other lights to extinguish (optional)
      description: Other room lights that should slowly fade off.
      default: []
      selector:
        entity:
          domain: light
          multiple: true
    speaker_volume:
      name: Bedroom-speaker volume
      description: Low enough not to disturb sleep — usually 0.10–0.20.
      default: 0.12
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider
    sleep_timer_minutes:
      name: Sleep-timer minutes
      description: Audio fades out and stops after this many minutes.
      default: 30
      selector:
        number:
          min: 5
          max: 240
          mode: slider
          unit_of_measurement: min
    fadeout_minutes:
      name: Audio fade-out duration
      description: Final fadeout slope to silence.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          mode: slider
          unit_of_measurement: min
    light_transition_seconds:
      name: Light-fade seconds
      description: How long the bedside light + other lights take to settle.
      default: 60
      selector:
        number:
          min: 5
          max: 600
          mode: slider
          unit_of_measurement: s

trigger:
  - platform: state
    entity_id: !input trigger_input_boolean
    to: "on"

variables:
  sabqi: "{{ states(states.sensor[0].entity_id) }}" # placeholder, overridden below
  sabqi_text: "{{ states(states.sensor[0].entity_id) }}"

action:
  - variables:
      sabqi_raw: "{{ states(states.sensor[0].entity_id) }}"
      portion: >-
        {%- set v = state_attr(states.sensor[0].entity_id, 'verse_key') -%}
        {{ v if v else states(states.sensor[0].entity_id) }}
  - parallel:
      # Bedside light: warm amber, gentle fade.
      - if:
          - "{{ states('!input bedside_light') is not none }}"
        then:
          - service: light.turn_on
            target:
              entity_id: !input bedside_light
            data:
              brightness_pct: 8
              rgb_color: [255, 160, 60]
              transition: !input light_transition_seconds
      # Other lights: extinguish.
      - service: light.turn_off
        target:
          entity_id: !input other_lights
        data:
          transition: !input light_transition_seconds
      # Bedroom speaker: play current sabqi at low volume via Nahaj service.
      - service: media_player.volume_set
        target:
          entity_id: !input bedroom_speaker
        data:
          volume_level: !input speaker_volume
      - service: nahaj.play_current_sabqi
        data:
          target: !input bedroom_speaker
  - delay:
      minutes: "{{ sleep_timer_minutes - fadeout_minutes }}"
  # Gradual fadeout: step volume → 0 over `fadeout_minutes`.
  - repeat:
      sequence:
        - service: media_player.volume_set
          target:
            entity_id: !input bedroom_speaker
          data:
            volume_level: >-
              {{ ([state_attr(media_player_input(), 'volume_level') | float(0.0) - 0.02, 0.0] | max) }}
        - delay:
            seconds: "{{ (fadeout_minutes * 60 / 12) | int }}"
      until:
        - condition: numeric_state
          entity_id: !input bedroom_speaker
          attribute: volume_level
          below: 0.02
  - service: media_player.media_stop
    target:
      entity_id: !input bedroom_speaker
  - service: input_boolean.turn_off
    target:
      entity_id: !input trigger_input_boolean

mode: restart
