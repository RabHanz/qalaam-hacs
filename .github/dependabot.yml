version: 2

updates:
  # Node / pnpm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "typescript-eslint"
      build-tooling:
        patterns:
          - "turbo"
          - "@changesets/*"
          - "prettier"
          - "eslint*"
      test-tooling:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "playwright"
          - "@playwright/*"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Python / pip / uv
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      python-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
    commit-message:
      prefix: "chore(deps-py)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(actions)"
